databases:
  - name: lexai-db
    databaseName: lexai
    user: lexai
    plan: free

services:
  - type: web
    name: lexai
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn lexai_backend.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lexai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
